<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | Omiaちゃん的小博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: 'JetBrains Mono', 'SimHei', '黑体', sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .emoji { font-size: 80px; margin-bottom: 20px; }
        h1 {
            font-size: 72px;
            color: #667eea;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
        p {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .back-btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🔍</div>
        <h1>404</h1>
        <p>哎呀，这个页面跑丢了喵～<br>你所访问的页面可能被移除或地址有误。</p>
        <a href="/" class="back-btn">← 返回首页喵~</a>
    </div>
</body>
</html>
