<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>控制台 — Omia</title>
<link rel="icon" href="../images/images1.jpg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e17;--card:rgba(17,24,39,.85);--border:#1e293b;--border2:#334155;
  --text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;
  --accent:#3b82f6;--green:#10b981;--red:#ef4444;--gold:#f59e0b;
  --font:'Noto Sans SC','Microsoft YaHei',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text2);min-height:100vh}
/* 门禁 */
.gate{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(10,14,23,.97);z-index:999;
}
.gate-box{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:36px 32px;width:92%;max-width:380px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.gate-box h2{color:var(--gold);font-size:20px;margin-bottom:24px}
.gate-box input{
  display:block;width:100%;padding:10px 14px;margin-bottom:10px;
  background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-family:var(--font);outline:none;
  transition:border-color .2s;
}
.gate-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.gate-box .err{color:var(--red);font-size:13px;min-height:20px;margin:4px 0}
.gate-box button{
  width:100%;padding:10px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;
}
.gate-box button:hover{background:#2563eb}
/* 布局 */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 20px;background:rgba(17,24,39,.9);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
}
.topbar span{color:var(--gold);font-weight:700;font-size:15px}
.main{
  flex:1;max-width:760px;margin:0 auto;width:100%;padding:24px 20px;
}
/* 卡片 */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:24px 28px;margin-bottom:20px;
}
.card h3{color:var(--accent);font-size:15px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.card p,.card li{font-size:14px;line-height:2}
.card code{background:rgba(15,23,42,.8);padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--gold)}
/* 按钮 */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:9px 18px;
  border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:all .2s;text-decoration:none;
}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#2563eb}
.btn-s{background:linear-gradient(135deg,var(--green),#059669);color:#fff}
.btn-s:hover{box-shadow:0 4px 16px rgba(16,185,129,.35)}
.btn-o{background:transparent;color:var(--accent);border:1px solid var(--border2)}
.btn-o:hover{border-color:var(--accent);background:rgba(59,130,246,.06)}
.btn-d{background:rgba(239,68,68,.12);color:var(--red)}
.btn-d:hover{background:rgba(239,68,68,.25);color:#fff}
/* 导出区 */
.export-area{
  width:100%;min-height:200px;max-height:400px;background:rgba(15,23,42,.8);
  border:1px solid var(--border);border-radius:8px;padding:16px 20px;
  font-family:var(--mono);font-size:12px;color:var(--text3);line-height:1.8;
  resize:vertical;outline:none;margin:12px 0;
}
.export-area:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
/* 状态徽章 */
.badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 14px;
  border-radius:14px;font-size:12px;font-weight:600;
}
.badge.on{background:rgba(16,185,129,.12);color:var(--green)}
.badge.off{background:rgba(100,116,139,.1);color:var(--text4)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.badge.on .dot{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,.5)}
.badge.off .dot{background:var(--text4)}
.stat{color:var(--text3);font-size:13px;margin-right:20px}
.stat strong{color:var(--text);font-size:28px;font-family:var(--mono)}
.msg{font-size:13px;min-height:20px;margin-top:6px}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
.hint{color:var(--text4);font-size:12px;margin-top:8px;line-height:1.8}
/* 表格 */
.tbl{width:100%;border-collapse:collapse;margin-top:8px}
.tbl th{background:rgba(30,41,59,.5);color:var(--text3);font-size:11px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(30,41,59,.4)}
.tbl tbody tr:hover{background:rgba(59,130,246,.04)}
.tag{display:inline-block;padding:2px 8px;background:rgba(59,130,246,.1);color:var(--accent);border-radius:10px;font-size:11px;font-family:var(--mono);margin:1px 3px}
.empty{text-align:center;padding:40px;color:var(--text4)}
/* 响应式 */
@media(max-width:640px){
  .main{padding:16px 12px}.card{padding:18px 16px}
}
</style>
</head>
<body>

<!-- ==================== 门禁 ==================== -->
<div id="gate" class="gate">
  <div class="gate-box">
    <h2>管理认证</h2>
    <input type="text" id="gUser" placeholder="用户名" autocomplete="off">
    <input type="password" id="gPass" placeholder="密码">
    <p class="err" id="gErr"></p>
    <button id="gBtn">登 录</button>
  </div>
</div>

<!-- ==================== 主面板 ==================== -->
<div id="shell" class="shell" style="display:none">
  <header class="topbar">
    <span>📦 控制台</span>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="../index.html" class="btn btn-o" style="font-size:12px;padding:6px 14px">🏠 主站</a>
      <button class="btn btn-d" style="font-size:12px;padding:6px 14px" onclick="logout()">退出</button>
    </div>
  </header>

  <main class="main">

    <!-- 状态栏 -->
    <div class="card">
      <span class="stat">文章：<strong id="cnt">—</strong></span>
      <span class="stat">同步：</span>
      <span class="badge off" id="pubBadge"><span class="dot"></span><span id="pubText">未发布</span></span>
      <div class="btn-row" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn btn-s" id="btnPub">🚀 同步到主站</button>
        <button class="btn btn-o" id="btnUnpub" style="display:none">↩ 取消同步</button>
        <a href="../index.html" target="_blank" class="btn btn-o" style="text-decoration:none">👁 预览主站</a>
      </div>
    </div>

    <!-- 导出 -->
    <div class="card">
      <h3>📤 导出 posts.json</h3>
      <textarea class="export-area" id="exportArea" readonly placeholder="加载中..."></textarea>
      <div class="btn-row">
        <button class="btn btn-s" id="btnDL">💾 下载</button>
        <button class="btn btn-o" id="btnCP">📋 复制</button>
      </div>
    </div>

    <!-- 导入 -->
    <div class="card">
      <h3>📥 导入 JSON 文件</h3>
      <input type="file" id="fileInp" accept=".json" style="display:none">
      <button class="btn btn-p" id="btnImp">📂 选择 JSON 文件导入</button>
      <p class="msg" id="impMsg"></p>
      <p class="hint">导入后点击 <b>同步到主站</b> 使内容在主站生效，再 git push 永久部署。</p>
    </div>

    <!-- 文章列表 -->
    <div class="card">
      <h3>📋 当前文章</h3>
      <div id="postTable"></div>
    </div>

  </main>
</div>

<script>
(function(){
'use strict';
var DATA_URL = '../data/posts.json';
var BOX_KEY = 'omiblog_z';
var PUB_KEY = 'omi_published';
var BOSS_KEY = 'adm_sesFlag';
var PASS_KEY = 'adm_pass';  // 简单密码存储
var DEF_USER = 'admin';
var DEF_PASS = '123456';

var g_posts = [];

// ===== 门禁 =====
function initGate(){
  if(localStorage.getItem(BOSS_KEY)==='1'){ showShell();return; }
  document.getElementById('gate').style.display='';
  document.getElementById('shell').style.display='none';
}

function login(){
  var u = document.getElementById('gUser').value.trim();
  var p = document.getElementById('gPass').value;
  var stored = localStorage.getItem(PASS_KEY);
  var ok = false;

  if(stored){
    var cred = JSON.parse(stored);
    if(u===cred.u && p===cred.p) ok=true;
  } else {
    // 首次：用默认密码，然后保存
    if(u===DEF_USER && p===DEF_PASS){ ok=true; localStorage.setItem(PASS_KEY,JSON.stringify({u:u,p:p})); }
  }
  if(ok){
    localStorage.setItem(BOSS_KEY,'1');
    document.getElementById('gate').style.display='none';
    document.getElementById('gUser').value='';document.getElementById('gPass').value='';
    document.getElementById('gErr').textContent='';
    showShell();
  } else {
    document.getElementById('gErr').textContent='凭证错误';
  }
}

function logout(){
  localStorage.removeItem(BOSS_KEY);
  document.getElementById('gate').style.display='';
  document.getElementById('shell').style.display='none';
}

// ===== 数据 =====
function fetchData(cb){
  fetch(DATA_URL+'?_t='+Date.now())
    .then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      if(d&&Array.isArray(d.posts)){g_posts=d.posts;try{localStorage.setItem(BOX_KEY,JSON.stringify(d.posts))}catch(e){}}
      if(cb)cb(null,d);
    })
    .catch(function(e){
      try{var r=localStorage.getItem(BOX_KEY);g_posts=r?JSON.parse(r):[]}catch(ex){g_posts=[]}
      if(cb)cb(e,null);
    });
}

// ===== 渲染 =====
function render(){
  document.getElementById('cnt').textContent=g_posts.length;
  updatePubBadge();

  // 导出区
  var ex={version:'4.0',updatedAt:new Date().toISOString(),posts:g_posts};
  document.getElementById('exportArea').value=JSON.stringify(ex,null,2);

  // 文章表
  var t=document.getElementById('postTable');
  if(!g_posts.length){t.innerHTML='<div class="empty">暂无文章</div>';return}
  var h='<table class="tbl"><thead><tr><th>ID</th><th>标题</th><th>日期</th><th>标签</th></tr></thead><tbody>';
  g_posts.forEach(function(p){
    h+='<tr><td>'+p.id+'</td><td><strong style="color:var(--text)">'+esc(p.title)+'</strong></td><td>'+esc(p.date)+'</td><td>'+(p.tags||[]).map(function(t){return'<span class="tag">'+esc(t)+'</span>'}).join(' ')+'</td></tr>';
  });
  h+='</tbody></table>';t.innerHTML=h;
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function updatePubBadge(){
  var on=localStorage.getItem(PUB_KEY)==='1';
  var b=document.getElementById('pubBadge');var t=document.getElementById('pubText');
  var bp=document.getElementById('btnPub');var bu=document.getElementById('btnUnpub');
  if(on){b.className='badge on';t.textContent='已发布';bp.style.display='none';bu.style.display=''}
  else{b.className='badge off';t.textContent='未发布';bp.style.display='';bu.style.display='none'}
}

// ===== 导出 =====
function download(){
  var c=document.getElementById('exportArea').value;
  if(!c){alert('无数据');return}
  var b=new Blob([c],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='posts_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(a.href);
}

function copyExport(){
  var c=document.getElementById('exportArea').value;
  navigator.clipboard.writeText(c).then(function(){alert('已复制')})
    .catch(function(){var ta=document.getElementById('exportArea');ta.select();document.execCommand('copy');alert('已复制')});
}

// ===== 导入 =====
function importFile(f){
  var m=document.getElementById('impMsg');m.textContent='';m.className='msg';
  var r=new FileReader();
  r.onload=function(e){
    try{var d=JSON.parse(e.target.result)}catch(err){m.textContent='❌ JSON格式错误';m.className='msg err';return}
    if(!d.posts||!Array.isArray(d.posts)){m.textContent='❌ 缺少 posts 数组';m.className='msg err';return}
    for(var i=0;i<d.posts.length;i++){var p=d.posts[i];if(!p.id||!p.title||!p.date||!p.content){m.textContent='❌ 第'+(i+1)+'篇文章缺少必要字段';m.className='msg err';return}}
    g_posts=d.posts;
    try{localStorage.setItem(BOX_KEY,JSON.stringify(d.posts))}catch(e){m.textContent='❌ 存储不足';m.className='msg err';return}
    render();m.textContent='✅ 导入成功！共 '+d.posts.length+' 篇';m.className='msg ok';
    updatePubBadge();
  };
  r.onerror=function(){m.textContent='❌ 读取失败';m.className='msg err'};
  r.readAsText(f);
}

// ===== 发布 =====
function publish(){
  try{localStorage.setItem(BOX_KEY,JSON.stringify(g_posts))}catch(e){alert('存储失败');return}
  localStorage.setItem(PUB_KEY,'1');updatePubBadge();alert('✅ 已同步到主站！');
}

function unpublish(){
  localStorage.removeItem(PUB_KEY);updatePubBadge();alert('↩ 已取消同步');
}

// ===== 事件 =====
function wire(){
  document.getElementById('gBtn').addEventListener('click',login);
  document.getElementById('gPass').addEventListener('keydown',function(e){if(e.key==='Enter')login()});
  document.getElementById('btnDL').addEventListener('click',download);
  document.getElementById('btnCP').addEventListener('click',copyExport);
  document.getElementById('btnImp').addEventListener('click',function(){document.getElementById('fileInp').click()});
  document.getElementById('fileInp').addEventListener('change',function(){if(this.files[0]){importFile(this.files[0]);this.value=''}});
  document.getElementById('btnPub').addEventListener('click',publish);
  document.getElementById('btnUnpub').addEventListener('click',unpublish);
}

function showShell(){
  document.getElementById('gate').style.display='none';
  document.getElementById('shell').style.display='';
  fetchData(function(){render()});
}

// 启动
initGate();wire();
if(localStorage.getItem(BOSS_KEY)==='1'){fetchData(function(){render()})}
})();
</script>
</body>
</html>
