<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Omiaちゃん的小博客 — 文章阅读">
    <meta name="author" content="Omiaちゃん">
    <meta property="og:title" id="ogTitle" content="Omiaちゃん的小博客">
    <meta property="og:description" id="ogDesc" content="分享编程学习与日常生活的个人站点">
    <meta property="og:type" content="article">
    <meta property="og:url" id="ogUrl" content="https://sunzshany.github.io/">
    <title id="pageTitle">阅读文章 — Omiaちゃん的小博客</title>
    <link rel="icon" href="images/images1.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ====== 阅读页专用样式 ====== */
        :root {
            --c-bg:     #0a0a1a;
            --c-card:   rgba(22,33,62,0.85);
            --c-line:   #2a2a4a;
            --c-line2:  #3a3a5c;
            --c-ink:    #ffffff;
            --c-body:   #c0c0d0;
            --c-soft:   #a0a0b8;
            --c-fade:   #808090;
            --c-chip:   #80b0e0;
            --c-fire:   #0f3460;
            --c-gold:   #ffd700;
            --font-cn:  'Microsoft YaHei', 'SimHei', '黑体', sans-serif;
            --font-mono:'JetBrains Mono', 'SimHei', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: var(--font-cn);
            background: var(--c-bg);
            color: var(--c-body);
            line-height: 1.8;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ---- 顶栏（极简） ---- */
        .read-topbar {
            position: sticky; top: 0; z-index: 100;
            width: 100%; height: 48px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: rgba(10,10,26,0.85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--c-line);
        }
        .read-back {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--c-chip); font-size: 14px; font-weight: 600;
            font-family: var(--font-cn); text-decoration: none;
            transition: all 0.2s ease;
        }
        .read-back:hover { color: #a0d0ff; gap: 12px; }
        .read-back-arrow { font-size: 18px; transition: transform 0.2s ease; }
        .read-back:hover .read-back-arrow { transform: translateX(-3px); }
        .read-top-title {
            color: var(--c-soft); font-size: 13px;
            font-family: var(--font-mono);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            max-width: 50%;
        }

        /* ---- 主体 ---- */
        .read-main {
            width: 100%; max-width: 780px;
            padding: 40px 28px 60px;
            flex: 1;
        }

        /* ---- 文章头 ---- */
        .article-header { margin-bottom: 36px; text-align: center; }
        .article-title {
            color: var(--c-ink);
            font-size: 32px; font-weight: 800;
            font-family: var(--font-cn);
            line-height: 1.35; margin-bottom: 18px;
            letter-spacing: 0.03em;
        }
        .article-meta {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; flex-wrap: wrap;
            color: var(--c-fade);
            font-size: 14px; font-family: var(--font-cn);
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(42,42,74,0.4);
        }
        .article-meta-item {
            display: inline-flex; align-items: center; gap: 5px;
        }
        .article-meta-sep { color: var(--c-line2); font-size: 12px; }

        /* ---- 题图 ---- */
        .article-hero {
            margin: 0 -28px 36px;
            border-radius: 0; overflow: hidden;
            box-shadow: 0 8px 36px rgba(0,0,0,0.5);
        }
        .article-hero img {
            display: block; width: 100%; max-height: 420px;
            object-fit: cover; cursor: pointer;
            transition: transform 0.5s ease;
        }
        .article-hero img:hover { transform: scale(1.02); }

        /* ---- 正文 ---- */
        .article-body {
            color: var(--c-body);
            font-size: 16px; line-height: 2.2;
            word-break: break-word;
        }
        .article-body p {
            margin-bottom: 22px; text-indent: 2em;
        }
        .article-body p:last-child { margin-bottom: 0; }
        /* 首段首字下沉 */
        .article-body p:first-of-type::first-letter {
            font-size: 3em; font-weight: 700;
            float: left; line-height: 0.7;
            padding: 5px 9px 0 0;
            color: var(--c-chip);
            font-family: var(--font-cn);
        }

        /* ---- 标签 ---- */
        .article-tags {
            margin-top: 36px; padding-top: 24px;
            border-top: 1px solid var(--c-line);
            display: flex; flex-wrap: wrap; gap: 10px;
            align-items: center;
        }
        .article-tags::before { content: '🏷️'; font-size: 15px; }
        .article-tags:empty { display: none; }
        .article-tag {
            display: inline-block;
            padding: 6px 16px;
            background: var(--c-fire);
            color: var(--c-chip);
            font-size: 13px; font-family: var(--font-mono);
            border-radius: 16px;
            border: 1px solid rgba(128,176,224,0.15);
            transition: all 0.2s ease;
        }
        .article-tag:hover { background: #1a4a80; transform: translateY(-1px); }

        /* ---- 底栏 ---- */
        .read-footer {
            width: 100%; max-width: 780px;
            padding: 0 28px 36px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px; flex-wrap: wrap;
        }
        .read-footer-note {
            color: var(--c-fade); font-size: 13px;
            font-family: var(--font-mono);
        }
        .read-footer-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            background: rgba(22,33,62,0.8);
            border: 1px solid var(--c-line);
            border-radius: 20px;
            color: var(--c-chip); font-size: 13px; font-weight: 600;
            font-family: var(--font-cn); cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .read-footer-btn:hover {
            background: #1b1f23; border-color: var(--c-line2);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        /* ---- 404 ---- */
        .read-404 {
            text-align: center; padding: 80px 20px;
        }
        .read-404 h2 {
            color: var(--c-ink); font-size: 24px; margin-bottom: 12px;
            font-family: var(--font-cn);
        }
        .read-404 p { color: var(--c-fade); font-size: 14px; margin-bottom: 24px; }

        /* ---- 滚动条 ---- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--c-line2); border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ---- 响应式 ---- */
        @media (max-width: 768px) {
            .read-main { padding: 28px 20px 48px; }
            .article-title { font-size: 26px; }
            .article-hero { margin: 0 -20px 28px; }
            .article-hero img { max-height: 280px; }
            .article-body { font-size: 15px; line-height: 2; }
            .article-body p { text-indent: 1.5em; margin-bottom: 16px; }
            .article-body p:first-of-type::first-letter { font-size: 2.4em; }
            .read-footer { padding: 0 20px 28px; }
            .read-topbar { padding: 0 16px; }
        }

        @media (max-width: 480px) {
            .read-main { padding: 20px 14px 36px; }
            .article-title { font-size: 22px; letter-spacing: 0.01em; }
            .article-meta { font-size: 12px; gap: 10px; }
            .article-hero { margin: 0 -14px 22px; }
            .article-hero img { max-height: 200px; }
            .article-body { font-size: 14px; line-height: 1.9; }
            .article-body p { text-indent: 1.2em; margin-bottom: 14px; }
            .article-body p:first-of-type::first-letter { font-size: 2em; padding-right: 6px; }
            .read-footer { padding: 0 14px 24px; flex-direction: column; text-align: center; }
            .read-topbar { padding: 0 12px; height: 44px; }
            .read-back { font-size: 13px; }
            .read-top-title { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- 极简顶栏 -->
    <header class="read-topbar">
        <a href="index.html" class="read-back">
            <span class="read-back-arrow">←</span> 返回首页
        </a>
        <span class="read-top-title" id="topTitle">Omiaちゃん的小博客</span>
    </header>

    <!-- 文章内容区 -->
    <main class="read-main" id="articleContent">
        <!-- 动态填充 -->
    </main>

    <!-- 底部操作 -->
    <footer class="read-footer" id="articleFooter">
        <!-- 动态填充 -->
    </footer>

    <script>
    (function() {
        'use strict';

        var BOX_KEY = 'omiblog_z';
        var DATA_URL = 'data/posts.json';

        function safeHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function safeAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        // 读取文章：本地优先 → 服务器 → 404
        function getPost(id, cb) {
            // 本地有数据直接用
            try {
                var localRaw = localStorage.getItem(BOX_KEY);
                if (localRaw) {
                    var localPosts = JSON.parse(localRaw);
                    if (Array.isArray(localPosts) && localPosts.length > 0) {
                        var localPost = localPosts.find(function(b) { return b.id === id; }) || null;
                        if (localPost) { cb(localPost); return; }
                    }
                }
            } catch(e) {}

            // 从服务器加载
            fetch(DATA_URL + '?_t=' + Date.now())
                .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function(data) {
                    if (data && Array.isArray(data.posts)) {
                        try { localStorage.setItem(BOX_KEY, JSON.stringify(data.posts)); } catch(e) {}
                        var post = data.posts.find(function(b) { return b.id === id; }) || null;
                        cb(post);
                    } else { cb(null); }
                })
                .catch(function(err) {
                    console.warn('⚠️ 无法加载文章:', err.message);
                    // 最后尝试 localStorage
                    try {
                        var raw = localStorage.getItem(BOX_KEY);
                        if (!raw) { cb(null); return; }
                        var posts = JSON.parse(raw);
                        var post = posts.find(function(b) { return b.id === id; }) || null;
                        cb(post);
                    } catch(e) { cb(null); }
                });
        }

        function getReadingLen(content) {
            if (!content) return '短篇';
            var len = content.replace(/\s/g, '').length;
            if (len < 200) return '短篇';
            if (len < 800) return '中篇';
            return '长文';
        }

        function render() {
            var params = new URLSearchParams(location.search);
            var id = parseInt(params.get('post'), 10);
            if (!id) {
                show404();
                return;
            }

            var main = document.getElementById('articleContent');
            var footer = document.getElementById('articleFooter');
            var topTitle = document.getElementById('topTitle');

            // 显示加载中
            main.innerHTML = '<div class="read-404"><h2>⏳ 加载中...</h2><p>正在获取文章内容</p></div>';

            getPost(id, function(post) {
                if (!post) {
                    show404();
                    return;
                }

                // 更新页面元信息
                document.title = post.title + ' — Omiaちゃん的小博客';
                if (topTitle) topTitle.textContent = post.title;

                // 更新 OG 标签
                var ogTitle = document.getElementById('ogTitle');
                var ogDesc = document.getElementById('ogDesc');
                var ogUrl = document.getElementById('ogUrl');
                if (ogTitle) ogTitle.setAttribute('content', post.title);
                if (ogDesc) ogDesc.setAttribute('content', (post.content || '').replace(/\s+/g, ' ').trim().slice(0, 120));
                if (ogUrl) ogUrl.setAttribute('content', location.href);

                // 正文
                var bodyText = (post.content || '').trim() || post.title;
                var paragraphs = bodyText.split('\n').filter(function(p) { return p.trim(); })
                    .map(function(p) { return '<p>' + safeHTML(p.trim()) + '</p>'; }).join('');

                // 题图
                var heroHTML = '';
                if (post.image || post.images) {
                    var imgSrc = post.image || post.images;
                    heroHTML = '<div class="article-hero">'
                        + '<img src="' + safeAttr(imgSrc) + '" alt="' + safeAttr(post.title) + '" '
                        + 'onclick="window.open(\'' + safeAttr(imgSrc) + '\')" loading="eager" '
                        + 'onerror="this.parentElement.style.display=\'none\'">'
                        + '</div>';
                }

                // 标签
                var tagsHTML = '';
                if (post.tags && post.tags.length) {
                    tagsHTML = post.tags.map(function(t) {
                        return '<span class="article-tag">' + safeHTML(t) + '</span>';
                    }).join('');
                }

                // 元信息
                var metaHTML = '<span class="article-meta-item">📅 ' + safeHTML(post.date) + '</span>'
                    + '<span class="article-meta-sep">│</span>'
                    + '<span class="article-meta-item">✍️ Omiaちゃん</span>'
                    + '<span class="article-meta-sep">│</span>'
                    + '<span class="article-meta-item">📖 ' + getReadingLen(post.content) + '</span>';

                // 渲染
                main.innerHTML = '<article>'
                    + '<header class="article-header">'
                    + '<h1 class="article-title">' + safeHTML(post.title) + '</h1>'
                    + '<div class="article-meta">' + metaHTML + '</div>'
                    + '</header>'
                    + heroHTML
                    + '<div class="article-body">' + paragraphs + '</div>'
                    + '<div class="article-tags">' + tagsHTML + '</div>'
                    + '</article>';

                // 底栏
                footer.innerHTML = '<span class="read-footer-note">© sunZshanY.inc · CC BY-NC-SA 4.0</span>'
                    + '<div style="display:flex;gap:10px;flex-wrap:wrap;">'
                    + '<button class="read-footer-btn" onclick="copyLink()">📋 复制链接</button>'
                    + '<a href="index.html" class="read-footer-btn">🏠 返回首页</a>'
                    + '</div>';
                footer.style.display = '';
            });
        }

        function show404() {
            var main = document.getElementById('articleContent');
            var footer = document.getElementById('articleFooter');
            main.innerHTML = '<div class="read-404">'
                + '<h2>😢 文章未找到</h2>'
                + '<p>这篇文章可能已被删除，或者链接地址不正确。</p>'
                + '<a href="index.html" class="read-footer-btn">← 返回首页</a>'
                + '</div>';
            if (footer) footer.style.display = 'none';
            document.title = '404 — Omiaちゃん的小博客';
        }

        // 复制链接
        window.copyLink = function() {
            navigator.clipboard.writeText(location.href).then(function() {
                var btn = document.querySelector('.read-footer-btn');
                if (btn) { var t = btn.textContent; btn.textContent = '✅ 已复制'; setTimeout(function(){ btn.textContent = t; }, 1800); }
            }).catch(function() {
                alert('复制失败，请手动复制地址栏链接');
            });
        };

        // 启动
        render();
    })();
    </script>

</body>
</html>
